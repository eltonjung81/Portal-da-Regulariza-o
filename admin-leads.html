<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Leads | MEI em Dia</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f9f9f9;
            --gold: #b5995e;
            --rule: #e5e5e5;
            --muted: #888;
            --green: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--rule); }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
        .logo span { color: var(--gold); }

        /* Login */
        #login-screen {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--rule);
            border-radius: 3px;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .btn {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        /* Dashboard */
        #dashboard { display: none; }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #fff; padding: 24px; border-radius: 4px; border: 1px solid var(--rule); }
        .stat-card span { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-card strong { font-size: 24px; color: var(--gold); }

        .table-wrap { background: #fff; border-radius: 4px; border: 1px solid var(--rule); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 16px; border-bottom: 2px solid var(--paper); font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; }
        td { padding: 16px; border-bottom: 1px solid var(--paper); font-size: 14px; }
        tr:hover { background: var(--paper); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge.paid { background: #e8f5e9; color: var(--green); }
        .badge.pending { background: #fff8e1; color: #f39c12; }

        .copy-link { color: var(--gold); text-decoration: none; font-size: 11px; cursor: pointer; }
        .whatsapp-btn { display: inline-block; padding: 6px 12px; background: #25d366; color: #fff; border-radius: 3px; text-decoration: none; font-size: 11px; font-weight: 600; }
        
        .refresh-btn { background: none; border: 1px solid var(--rule); padding: 8px 16px; cursor: pointer; font-size: 12px; border-radius: 3px; }
        .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGIN SECTION -->
        <section id="login-screen">
            <div class="login-box">
                <h2>Acesso Restrito</h2>
                <input type="password" id="admin-pass" placeholder="Digite a senha do portal">
                <button class="btn" onclick="tryLogin()">Entrar no Painel</button>
                <p id="login-error" style="color:red; font-size:12px; margin-top:10px; display:none;">Senha incorreta. Tente novamente.</p>
            </div>
        </section>

        <!-- DASHBOARD SECTION -->
        <section id="dashboard">
            <header>
                <div class="logo">MEI em Dia <span>Painel Leads</span></div>
                <button class="refresh-btn" onclick="loadLeads()">Atualizar Dados ↻</button>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <span>Total de Leads</span>
                    <strong id="stat-total">0</strong>
                </div>
                <div class="stat-card">
                    <span>Pagamentos Aprovados</span>
                    <strong id="stat-paid" style="color: var(--green);">0</strong>
                </div>
                <div class="stat-card">
                    <span>Faturamento Estimado</span>
                    <strong id="stat-rev">R$ 0,00</strong>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>CNPJ</th>
                            <th>Nome / Razão Social</th>
                            <th>Plano</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th>WhatsApp</th>
                            <th>Senha Gov.br</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="leads-body">
                        <!-- Leads go here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let authToken = null;

        async function tryLogin() {
            const pass = document.getElementById('admin-pass').value;
            try {
                const res = await fetch('http://localhost:8000/api/v1/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });
                if (res.ok) {
                    authToken = pass; // Using pass as simple auth token for now
                    showDashboard();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (e) { console.error(e); }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadLeads();
        }

        async function loadLeads() {
            try {
                const res = await fetch('http://localhost:8000/api/v1/admin/leads');
                const leads = await res.json();
                renderLeads(leads);
            } catch (e) { console.error(e); }
        }

        async function adminDelete(id) {
            if (!confirm("Tem certeza que deseja apagar este lead? Esta ação não pode ser desfeita.")) return;
            try {
                const res = await fetch(`http://localhost:8000/api/v1/admin/leads/${id}`, { method: 'DELETE' });
                if (res.ok) loadLeads();
            } catch (e) { console.error(e); }
        }

        function renderLeads(leads) {
            const body = document.getElementById('leads-body');
            body.innerHTML = '';
            
            let totalRev = 0;
            let paidCount = 0;

            leads.forEach(l => {
                const date = new Date(l.created_at).toLocaleDateString('pt-BR');
                const statusClass = l.status === 'paid' || l.status === 'completed' ? 'paid' : 'pending';
                const statusLabel = l.status === 'paid' || l.status === 'completed' ? 'Aprovado' : 'Pendente';
                
                if (l.status === 'paid' || l.status === 'completed') {
                    totalRev += l.price;
                    paidCount++;
                }

                const waLink = l.phone ? `<a href="https://wa.me/${l.phone.replace(/\D/g,'')}" class="whatsapp-btn" target="_blank">Chamar (${l.phone})</a>` : '<span style="color:#ccc">N/A</span>';

                body.innerHTML += `
                    <tr>
                        <td style="color:var(--muted)">${date}</td>
                        <td style="font-weight:500">${l.cnpj}</td>
                        <td style="font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${l.razao_social}">${l.razao_social || '--'}</td>
                        <td>${l.plan}</td>
                        <td>R$ ${l.price.toFixed(2)}</td>
                        <td><span class="badge ${statusClass}">${statusLabel}</span></td>
                        <td>${waLink}</td>
                        <td style="font-family:monospace">${l.gov_password || '--'}</td>
                        <td><button onclick="adminDelete('${l.id}')" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;" title="Apagar">🗑️</button></td>
                    </tr>
                `;
            });

            document.getElementById('stat-total').innerText = leads.length;
            document.getElementById('stat-paid').innerText = paidCount;
            document.getElementById('stat-rev').innerText = `R$ ${totalRev.toFixed(2)}`;
        }
    </script>
</body>
</html>
